<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self';" />
  <title>ZeroTier Desktop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- ===== Header / node status ===== -->
    <header class="glass topbar" id="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.5l8.2 4.7v9.6L12 21.5 3.8 16.8V7.2L12 2.5z" />
            <circle cx="12" cy="12" r="2.4" />
            <path d="M12 9.6V5.2M14.4 12h4.4M9.6 12H5.2" />
          </svg>
        </span>
        <div class="brand-text">
          <span class="brand-title">ZeroTier</span>
          <span class="brand-sub" data-i18n="app.subtitle">Local Node</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="node-status" id="nodeStatus" data-state="loading">
          <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          <div class="node-meta">
            <span class="node-address" id="nodeAddress" data-i18n="node.connecting">connecting</span>
            <span class="node-sub" id="nodeSub" data-i18n="node.waiting">waiting for service</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm reconnect-btn" id="reconnectBtn" type="button" data-i18n="reconnect.button" hidden>Reconnect</button>
          <button class="icon-btn" id="langBtn" type="button" data-i18n-title="lang.toggle" aria-label="Switch language">EN</button>
          <button class="icon-btn" id="themeBtn" type="button" data-i18n-title="theme.toggle" aria-label="Toggle theme"></button>
        </div>
      </div>
    </header>

    <!-- ===== Toolbar ===== -->
    <section class="glass toolbar" id="toolbar">
      <button class="icon-btn" id="listToggleBtn" type="button" data-i18n-title="list.toggle" aria-label="Toggle network list">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
      </button>
      <form class="join-form" id="joinForm" autocomplete="off">
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14" /></svg>
        </span>
        <input id="networkIdInput" class="join-input" type="text"
               placeholder="Join a network — 16 hex chars" spellcheck="false" maxlength="16"
               data-i18n-ph="join.placeholder" aria-label="Network ID to join" />
        <button class="btn btn-primary" type="submit" id="joinBtn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14" /></svg>
          <span data-i18n="join.button">Join</span>
        </button>
      </form>

      <div class="refresh-control">
        <button class="btn btn-ghost btn-icon" id="refreshNowBtn" type="button" data-i18n-title="refresh.now" aria-label="Refresh now">
          <svg class="refresh-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 3v6h-6" /></svg>
        </button>
        <div class="interval-wrap">
          <button class="btn btn-ghost btn-interval" id="intervalBtn" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="intervalLabel">10s</span>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6" /></svg>
          </button>
          <div class="interval-menu" id="intervalMenu" hidden>
            <button type="button" data-int="0" data-i18n="interval.menuOff">Manual (off)</button>
            <button type="button" data-int="5" data-i18n="interval.menu5">Every 5s</button>
            <button type="button" data-int="10" data-i18n="interval.menu10">Every 10s</button>
            <button type="button" data-int="30" data-i18n="interval.menu30">Every 30s</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== Master-detail: network list + selected network detail ===== -->
    <section class="glass split" id="networkSplit">
      <aside class="net-list" id="netList">
        <span class="net-indicator" id="netIndicator" aria-hidden="true"></span>
        <div class="net-list-head">
          <span class="panel-title">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.2" /><circle cx="18" cy="6" r="2.2" /><circle cx="12" cy="18" r="2.2" /><path d="M7.6 7.4l3.2 8.4M16.4 7.4l-3.2 8.4M8 6h8" /></svg>
            <span data-i18n="networks.title">Networks</span>
          </span>
          <span class="panel-count" id="networkCount">0</span>
        </div>
        <div class="net-items" id="netItems">
          <div class="empty" data-i18n="networks.loading">Loading networks</div>
        </div>
      </aside>

      <div class="net-detail" id="netDetail">
        <div class="detail-empty">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"><circle cx="12" cy="12" r="9" /><path d="M9 12l2 2 4-4" /></svg>
          <span data-i18n="detail.empty">Select a network to view its neighbors</span>
        </div>
      </div>
    </section>

    <footer class="footer" id="footer">
      <span id="lastUpdated" data-i18n="updated.never">not refreshed yet</span>
      <span class="footer-note" data-i18n="footer.note">local control · 127.0.0.1:9993</span>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="vendor/gsap.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
